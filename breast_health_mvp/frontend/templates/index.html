<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乳腺结节健康管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 20px;
            margin-bottom: 50px;
            opacity: 0.9;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            display: block;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .card-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        
        .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        
        .card.patient {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .card.patient .card-title,
        .card.patient .card-desc {
            color: white;
        }
        
        .card.admin {
            background: white;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            
            .subtitle {
                font-size: 16px;
            }
            
            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 乳腺结节健康管理系统</h1>
        <p class="subtitle">AI智能问诊 · 专业健康管理</p>
        
        <div class="cards">
            <!-- 患者端入口 -->
            <a href="/patient/chat" class="card patient">
                <div class="card-icon">💬</div>
                <div class="card-title">我是患者</div>
                <div class="card-desc">
                    无需登录，直接开始AI智能问诊<br>
                    10个简单问题，生成专业健康报告
                </div>
            </a>
            
            <!-- 管理端入口 -->
            <a href="/login" class="card admin">
                <div class="card-icon">👨‍⚕️</div>
                <div class="card-title">健康管理师</div>
                <div class="card-desc">
                    登录后台管理系统<br>
                    患者管理、报告生成、跟进记录
                </div>
            </a>
        </div>
    </div>
</body>
</html>
