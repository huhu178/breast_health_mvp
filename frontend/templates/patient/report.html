<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的健康管理报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .report-content {
            background: white;
            padding: 40px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .report-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .meta-label {
            font-size: 13px;
            color: #666;
        }
        
        .meta-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .risk-badge.low {
            background: #d4edda;
            color: #155724;
        }
        
        .risk-badge.medium {
            background: #fff3cd;
            color: #856404;
        }
        
        .risk-badge.high {
            background: #f8d7da;
            color: #721c24;
        }
        
        .report-section {
            margin-bottom: 30px;
        }
        
        .report-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .report-section p {
            line-height: 1.8;
            color: #555;
            margin-bottom: 15px;
        }
        
        .report-html {
            line-height: 1.8;
            color: #333;
        }
        
        .report-html h3 {
            font-size: 18px;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .report-html ul, .report-html ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }
        
        .report-html li {
            margin-bottom: 8px;
        }
        
        .action-bar {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #f8f9fa;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .contact-info {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            border-left: 4px solid #667eea;
        }
        
        .contact-info h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .contact-info p {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }
        
        @media print {
            body {
                background: white;
            }
            
            .action-bar {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .report-content {
                padding: 20px;
            }
            
            .report-meta {
                grid-template-columns: 1fr;
            }
            
            .action-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 乳腺结节健康管理报告</h1>
            <p>AI智能生成 · 专业医学建议</p>
        </div>
        
        <div class="report-content" id="reportContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载您的报告...</p>
            </div>
        </div>
    </div>

    <script>
        // 从URL获取参数
        const urlParams = new URLSearchParams(window.location.search);
        const phone = urlParams.get('phone');
        const reportId = window.location.pathname.split('/').pop();
        
        // 加载报告
        async function loadReport() {
            if (!phone || !reportId) {
                showError('缺少必要参数');
                return;
            }
            
            try {
                const response = await fetch(`/api/patient/report/${reportId}?phone=${phone}`);
                const result = await response.json();
                
                if (result.code === 0) {
                    renderReport(result.data);
                } else {
                    showError(result.message);
                }
            } catch (error) {
                console.error('加载报告失败:', error);
                showError('加载报告失败，请刷新重试');
            }
        }
        
        // 渲染报告
        function renderReport(data) {
            const container = document.getElementById('reportContent');
            
            // 风险等级映射
            const riskLevelMap = {
                '低风险': 'low',
                '中风险': 'medium',
                '高风险': 'high'
            };
            
            const riskClass = riskLevelMap[data.risk_level] || 'medium';
            
            container.innerHTML = `
                <div class="report-meta">
                    <div class="meta-item">
                        <span class="meta-label">患者姓名</span>
                        <span class="meta-value">${data.patient_name}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">联系电话</span>
                        <span class="meta-value">${data.patient_phone || '未提供'}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">报告编号</span>
                        <span class="meta-value">${data.report_code}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">生成时间</span>
                        <span class="meta-value">${formatDate(data.created_at)}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">风险评估</span>
                        <span class="meta-value">
                            <span class="risk-badge ${riskClass}">${data.risk_level}</span>
                        </span>
                    </div>
                </div>
                
                ${data.report_summary ? `
                <div class="report-section">
                    <h2>📋 报告摘要</h2>
                    <p>${data.report_summary}</p>
                </div>
                ` : ''}
                
                <div class="report-section">
                    <h2>📊 详细报告</h2>
                    <div class="report-html">
                        ${data.report_html || '<p>报告内容加载中...</p>'}
                    </div>
                </div>
                
                ${data.recommendations ? `
                <div class="report-section">
                    <h2>💡 健康建议</h2>
                    <div class="report-html">
                        ${data.recommendations}
                    </div>
                </div>
                ` : ''}
                
                <div class="contact-info">
                    <h3>📞 后续服务</h3>
                    <p>
                        ✅ 您的报告已生成，我们的健康管理师将在24小时内与您联系。<br>
                        ✅ 如有紧急问题，请拨打健康热线：400-XXX-XXXX<br>
                        ✅ 建议定期复查，关注健康变化
                    </p>
                </div>
                
                <div class="action-bar">
                    <button class="btn btn-secondary" onclick="window.print()">🖨️ 打印报告</button>
                    <a href="/patient/chat" class="btn btn-primary">🔄 重新问诊</a>
                </div>
            `;
        }
        
        // 显示错误
        function showError(message) {
            const container = document.getElementById('reportContent');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px; color: #f56c6c;">
                    <h2 style="font-size: 24px; margin-bottom: 15px;">❌ ${message}</h2>
                    <p style="color: #999; margin-bottom: 20px;">请检查链接是否正确，或联系客服</p>
                    <a href="/patient/chat" class="btn btn-primary" style="display: inline-block;">返回重新问诊</a>
                </div>
            `;
        }
        
        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', loadReport);
    </script>
</body>
</html>
