<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乳腺结节健康管理 - AI智能问诊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 顶部 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.ai {
            justify-content: flex-start;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .message.ai .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-left: 12px;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
        }
        
        .message.ai .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }
        
        /* 输入区域 */
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }
        
        /* 快捷选项 */
        .quick-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .quick-option {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .quick-option:hover {
            background: #667eea;
            color: white;
        }
        
        /* 加载动画 */
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 16px;
            width: fit-content;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        
        /* 手机号验证模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .modal-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            border-color: #667eea;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        /* 进度指示器 */
        .progress-bar {
            background: #f0f0f0;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }
        
        .progress-text {
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            
            .message-content {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 顶部 -->
        <div class="chat-header">
            <h1>🏥 乳腺结节健康管理AI助手</h1>
            <p>我将通过几个问题了解您的健康状况，为您生成专业的健康管理报告</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">对话进度: 0/10</div>
        </div>
        
        <!-- 消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <!-- 欢迎消息 -->
            <div class="message ai">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    您好！我是您的健康管理AI助手。<br><br>
                    接下来我会通过几个简单的问题，了解您的乳腺健康状况，包括：<br>
                    • 基本信息（年龄、症状）<br>
                    • 检查结果（BI-RADS分级等）<br>
                    • 生活习惯和家族史<br><br>
                    所有信息都将严格保密，仅用于生成您的个性化健康报告。<br><br>
                    准备好了吗？让我们开始吧！👇
                </div>
            </div>
            
            <!-- 打字指示器 -->
            <div class="message ai">
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator" id="typingIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
        
        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div id="quickOptionsContainer" class="quick-options">
                <!-- 快捷选项动态生成 -->
            </div>
            <div class="chat-input-container">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="userInput" 
                    placeholder="输入您的回答..."
                    autocomplete="off"
                >
                <button class="send-button" id="sendButton">
                    ➤
                </button>
            </div>
        </div>
    </div>
    
    <!-- 手机号验证模态框 -->
    <div id="phoneModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎉 信息收集完成！</h2>
                <p>请留下您的联系方式，即可查看您的专属健康报告</p>
            </div>
            <form id="phoneForm">
                <div class="form-group">
                    <label>姓名 <span style="color: red;">*</span></label>
                    <input type="text" id="patientName" required placeholder="请输入您的姓名">
                </div>
                <div class="form-group">
                    <label>手机号 <span style="color: red;">*</span></label>
                    <input type="tel" id="patientPhone" required placeholder="请输入手机号" pattern="1[3-9]\d{9}">
                </div>
                <div class="form-group">
                    <label>微信号（选填）</label>
                    <input type="text" id="patientWechat" placeholder="方便健康管理师联系您">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">生成报告</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 全局状态
        let conversationState = {
            sessionId: generateSessionId(),
            currentStep: 0,
            totalSteps: 10,
            collectedData: {},
            conversationHistory: []
        };
        
        // 问题流程配置
        const questionFlow = [
            {
                id: 'age',
                question: '首先，请问您的年龄是多少？',
                type: 'number',
                field: 'age',
                quickOptions: ['20-30岁', '31-40岁', '41-50岁', '50岁以上']
            },
            {
                id: 'birads',
                question: '您最近的乳腺B超或钼靶检查结果中，BI-RADS分级是多少？',
                type: 'select',
                field: 'birads_level',
                quickOptions: ['BI-RADS 2级', 'BI-RADS 3级', 'BI-RADS 4级', 'BI-RADS 5级', '未做过检查']
            },
            {
                id: 'nodule_size',
                question: '检查报告中提到结节的大小吗？（如：1.2cm × 0.8cm）',
                type: 'text',
                field: 'nodule_size',
                quickOptions: ['小于1cm', '1-2cm', '大于2cm', '不清楚']
            },
            {
                id: 'symptoms',
                question: '您目前有以下症状吗？（可多选）',
                type: 'multiselect',
                field: 'symptoms',
                quickOptions: ['乳房疼痛', '乳头溢液', '皮肤改变', '腋窝淋巴结肿大', '无明显症状']
            },
            {
                id: 'family_history',
                question: '您的家族中有乳腺癌或其他肿瘤病史吗？',
                type: 'select',
                field: 'family_history',
                quickOptions: ['有（直系亲属）', '有（非直系亲属）', '无', '不清楚']
            },
            {
                id: 'discovery_time',
                question: '您是什么时候发现结节的？',
                type: 'text',
                field: 'nodule_discovery_time',
                quickOptions: ['3个月内', '3-6个月', '6个月-1年', '1年以上']
            },
            {
                id: 'menstrual_cycle',
                question: '您的月经周期规律吗？',
                type: 'select',
                field: 'menstrual_cycle',
                quickOptions: ['规律', '不规律', '已绝经', '其他情况']
            },
            {
                id: 'sleep_quality',
                question: '您的睡眠质量如何？',
                type: 'select',
                field: 'sleep_quality',
                quickOptions: ['很好', '一般', '较差', '失眠']
            },
            {
                id: 'exercise',
                question: '您平时运动的频率是？',
                type: 'select',
                field: 'exercise_frequency',
                quickOptions: ['每天运动', '每周3-5次', '偶尔运动', '几乎不运动']
            },
            {
                id: 'emotional_state',
                question: '最近您的情绪状态如何？',
                type: 'select',
                field: 'emotional_state',
                quickOptions: ['情绪稳定', '偶尔焦虑', '经常焦虑', '压力很大']
            }
        ];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定发送按钮
            document.getElementById('sendButton').addEventListener('click', sendMessage);
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // 绑定手机号表单
            document.getElementById('phoneForm').addEventListener('submit', handlePhoneSubmit);
            
            // 开始第一个问题
            setTimeout(() => {
                askNextQuestion();
            }, 1000);
        });
        
        // 生成会话ID
        function generateSessionId() {
            return 'CHAT_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        // 询问下一个问题
        function askNextQuestion() {
            if (conversationState.currentStep >= questionFlow.length) {
                // 所有问题完成，显示手机号验证
                showPhoneModal();
                return;
            }
            
            const question = questionFlow[conversationState.currentStep];
            
            // 显示打字动画
            showTyping();
            
            setTimeout(() => {
                hideTyping();
                
                // 添加AI问题
                addMessage('ai', question.question);
                
                // 显示快捷选项
                if (question.quickOptions) {
                    showQuickOptions(question.quickOptions, question.type === 'multiselect');
                }
                
                // 更新进度
                updateProgress();
            }, 1000);
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addMessage('user', message);
            
            // 保存答案
            const currentQuestion = questionFlow[conversationState.currentStep];
            conversationState.collectedData[currentQuestion.field] = message;
            conversationState.conversationHistory.push({
                question: currentQuestion.question,
                answer: message,
                timestamp: new Date().toISOString()
            });
            
            // 清空输入框
            input.value = '';
            
            // 清空快捷选项
            document.getElementById('quickOptionsContainer').innerHTML = '';
            
            // 下一步
            conversationState.currentStep++;
            
            // 延迟询问下一个问题
            setTimeout(() => {
                askNextQuestion();
            }, 800);
        }
        
        // 添加消息
        function addMessage(type, content) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const avatar = type === 'ai' ? '🤖' : '👤';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    ${content}
                    <div class="message-time">${formatTime(new Date())}</div>
                </div>
            `;
            
            // 在打字指示器之前插入
            const typingIndicator = messagesContainer.querySelector('.typing-indicator').parentElement;
            messagesContainer.insertBefore(messageDiv, typingIndicator);
            
            // 滚动到底部
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 显示快捷选项
        function showQuickOptions(options, isMultiSelect) {
            const container = document.getElementById('quickOptionsContainer');
            container.innerHTML = '';
            
            const selectedOptions = new Set();
            
            options.forEach(option => {
                const button = document.createElement('div');
                button.className = 'quick-option';
                button.textContent = option;
                
                button.addEventListener('click', function() {
                    if (isMultiSelect) {
                        // 多选模式
                        if (selectedOptions.has(option)) {
                            selectedOptions.delete(option);
                            button.style.background = 'white';
                            button.style.color = '#667eea';
                        } else {
                            selectedOptions.add(option);
                            button.style.background = '#667eea';
                            button.style.color = 'white';
                        }
                        
                        // 更新输入框
                        document.getElementById('userInput').value = Array.from(selectedOptions).join('、');
                    } else {
                        // 单选模式
                        document.getElementById('userInput').value = option;
                        sendMessage();
                    }
                });
                
                container.appendChild(button);
            });
        }
        
        // 显示/隐藏打字动画
        function showTyping() {
            document.getElementById('typingIndicator').classList.add('active');
            scrollToBottom();
        }
        
        function hideTyping() {
            document.getElementById('typingIndicator').classList.remove('active');
        }
        
        // 更新进度
        function updateProgress() {
            const progress = (conversationState.currentStep / conversationState.totalSteps) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = 
                `对话进度: ${conversationState.currentStep}/${conversationState.totalSteps}`;
        }
        
        // 显示手机号模态框
        function showPhoneModal() {
            addMessage('ai', '非常感谢您的配合！所有信息已收集完成。<br><br>现在我将为您生成专业的健康管理报告，请留下您的联系方式以便查看报告。');
            document.getElementById('phoneModal').style.display = 'block';
        }
        
        // 处理手机号提交
        async function handlePhoneSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('patientName').value.trim();
            const phone = document.getElementById('patientPhone').value.trim();
            const wechat = document.getElementById('patientWechat').value.trim();
            
            if (!name || !phone) {
                alert('请填写姓名和手机号');
                return;
            }
            
            // 显示加载状态
            const submitBtn = e.target.querySelector('.btn-primary');
            submitBtn.textContent = '生成中...';
            submitBtn.disabled = true;
            
            try {
                // 调用后端API生成报告
                const response = await fetch('/api/patient/generate-report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        phone: phone,
                        wechat_id: wechat,
                        session_id: conversationState.sessionId,
                        collected_data: conversationState.collectedData,
                        conversation_history: conversationState.conversationHistory
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 0) {
                    // 成功，跳转到报告页面
                    window.location.href = `/patient/report/${result.data.report_id}?phone=${phone}`;
                } else {
                    alert('报告生成失败：' + result.message);
                    submitBtn.textContent = '生成报告';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('报告生成失败:', error);
                alert('网络错误，请稍后重试');
                submitBtn.textContent = '生成报告';
                submitBtn.disabled = false;
            }
        }
        
        // 滚动到底部
        function scrollToBottom() {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 格式化时间
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
