      color:#155eef;display:flex;align-items:center;justify-content:center;padding:48px}

    .login-pattern span:nth-child(1){left:10%;top:22%}
    .login-pattern span:nth-child(2){left:28%;top:14%}
    .login-pattern span:nth-child(3){left:12%;bottom:30%}
    .login-pattern span:nth-child(4){right:26%;top:32%}
    .login-pattern span:nth-child(5){right:20%;bottom:22%}

    .login-monitor::before{content:"";position:absolute;inset:9px 12px;background:#fff;border-radius:3px}
    .login-monitor::after{content:"";position:absolute;left:43px;bottom:-18px;width:10px;height:18px;background:#4b5563}
    .login-dots{position:absolute;z-index:2;width:6px;height:6px;background:#155eef;border-radius:50%;box-shadow:0 14px 0 #80b7ff,0 28px 0 #b5d7ff;left:43px;top:18px}

    .login-visual-sub{font-size:13px;color:#64748b;margin-top:10px;white-space:nowrap}

    let currentPatientId = "p1";
    let currentStatus = "all";
    let currentNodule = "all";

    const $ = (id) => document.getElementById(id);
    const currentPatient = () => patients.find(p => p.id === currentPatientId) || patients[0];
    const riskText = (risk) => risk === "high" ? "高风险" : risk === "mid" ? "中风险" : "低风险";

    function toast(text){
      $("toast").textContent = text;
      $("toast").classList.add("show");
      setTimeout(() => $("toast").classList.remove("show"), 1700);
    }

    function setStage(patient, nextStage, eventText){
      patient.stage = nextStage;
      patient.events.push(eventText);
      renderAll();
      toast(eventText);
    }

    function navIcon(name){
      if(name === "运行看板") return "▦";
      if(name === "患者队列") return "👥";
      if(name === "患者建档") return "＋";
      if(name === "报告处理") return "📝";
      if(name === "医生复核") return "医";
      if(name === "患者触达") return "✉";
      if(name === "随访任务") return "☑";
      return "📊";
    }

    function renderNav(){
      $("nav").innerHTML = modules.map(([id,name,count]) => `
        <button class="${id === currentModule ? "active" : ""}" data-module="${id}">
          <span class="nav-ico">${navIcon(name)}</span>
          <span>${name}</span>${count ? `<span class="num">${count}</span>` : ""}
        </button>
      `).join("");
      $("nav").querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          currentModule = btn.dataset.module;
          renderAll();
          toast(`已切换：${btn.textContent.trim()}`);
        });
      });
    }

    function renderNoduleEntries(){
      $("noduleEntries").innerHTML = noduleTypes.map(([id,name,count]) => `
        <button class="entry-btn ${id === currentNodule ? "active" : ""}" data-nodule="${id}">
          <span>${name}</span><span>${count}</span>
        </button>
      `).join("");
      $("noduleEntries").querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          currentNodule = btn.dataset.nodule;
          $("noduleFilter").value = currentNodule;
          renderNoduleEntries();
          renderEntrySummary();
          renderPatientList();
        });
      });
    }

    function renderNoduleFilterOptions(){
      $("noduleFilter").innerHTML = noduleTypes.map(([id,name]) => `
        <option value="${id}">${name}</option>
      `).join("");
      $("noduleFilter").value = currentNodule;
    }

    function renderEntrySummary(){
      const found = noduleTypes.find(([id]) => id === currentNodule) || noduleTypes[0];
      const count = currentNodule === "all" ? patients.length : patients.filter(p => p.noduleType === currentNodule).length;
      $("entrySummary").innerHTML = `
        <span class="tag blue">${found[1]}</span>
        <span class="muted">筛选出 ${count} 名患者，表格展示当前入口下的患者队列。</span>
      `;
    }

    function renderContextbar(){
      const found = noduleTypes.find(([id]) => id === currentNodule) || noduleTypes[0];
      const p = currentPatient();
      $("contextbar").innerHTML = `
        <span>当前关系</span>
        <span class="strong">${moduleLabels[currentModule] || "工作台"}</span>
        <span class="arrow">/</span>
        <span class="strong">${found[1]}</span>
        <span class="arrow">/</span>
        <span>患者队列表单</span>
        <span class="arrow">/</span>
        <span class="strong">${p.name}</span>
        <span>${stageLabels[p.stage]}</span>
      `;
    }

    function renderSummary(){
      const base = [
        ["患者总数","12,486","较昨日 +128","👥","blue"],
        ["高风险患者","1,268","较昨日 +23","盾","orange"],
        ["待处理报告","146","较昨日 -12","文","blue"],
        ["待医生复核","82","较昨日 -5","医","green"],
        ["待推送患者","95","较昨日 +7","发","purple"],
        ["随访完成率","78.6%","较昨日 +1.8%","率","cyan"]
      ];
      const queueStats = [...base, ["异常待处理","102","较昨日 +18","!","orange"]];
      const reportStats = [
        ["待处理报告","146","较昨日 -12","文","blue"],
        ["AI解析中","38","较昨日 +5","AI","purple"],
        ["解析完成","284","较昨日 +18","✓","green"],
        ["待生成报告","95","较昨日 +7","稿","orange"],
        ["待医生复核","82","较昨日 -5","医","green"],
        ["异常报告","17","较昨日 +3","⚠","orange"]
      ];
      const reviewStats = [
        ["待复核报告","82","较昨日 +12","复","blue"],
        ["今日已复核","46","较昨日 +8","✓","green"],
        ["退回修改","11","较昨日 -3","退","orange"],
        ["高风险确认","18","较昨日 +5","!","orange"],
        ["待推送患者","57","较昨日 +9","发","purple"],
        ["平均复核时长","12.6分钟","较昨日 -1.2","⏱","cyan"]
      ];
      const followStats = [
        ["今日随访","128","较昨日 +18","访","blue"],
        ["待随访","246","较昨日 +124","⏲","orange"],
        ["已完成","89","较昨日 +15","✓","green"],
        ["逾期随访","36","较昨日 +6","!","orange"],
        ["异常反馈","18","较昨日 +4","铃","purple"],
        ["自动提醒中","74","较昨日 +11","✈","cyan"]
      ];
      const mgmtStats = [
        ["管理患者总数","12,486","较上月 +8.6%","👥","blue"],
        ["新增患者数","326","较上月 +5.2%","＋","green"],
        ["高风险患者数","1,268","较上月 +12.4%","盾","orange"],
        ["报告生成率","92.4%","较上月 +2.1pp","文","blue"],
        ["医生复核率","88.7%","较上月 +1.6pp","医","purple"],
        ["患者触达率","93.6%","较上月 +0.8pp","✉","green"],
        ["复查转化率","61.3%","较上月 +1.7pp","↻","blue"]
      ];

      const stats = currentModule === "queue"
        ? queueStats
        : (currentModule === "report"
          ? reportStats
          : (currentModule === "review"
            ? reviewStats
            : (currentModule === "followup"
              ? followStats
              : (currentModule === "stats" ? mgmtStats : base))));

      $("summary").style.gridTemplateColumns = `repeat(${stats.length}, minmax(132px, 1fr))`;
      $("summary").innerHTML = stats.map(([label,value,hint,icon,tone]) => `
        <div class="kpi">
          <div class="kpi-icon ${tone === "blue" ? "" : tone}">${icon}</div>
          <div class="label">${label}</div>
          <div class="value">${value}</div>

    function renderStatusTabs(){
      const tabs = [["all","全部"],["report","待处理报告"],["review","待复核"],["push","待推送"],["alert","异常"]];
      $("statusTabs").innerHTML = tabs.map(([id,name]) => `
        <button class="${id === currentStatus ? "active" : ""}" data-status="${id}">${name}</button>
      `).join("");
      $("statusTabs").querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          currentStatus = btn.dataset.status;
          renderStatusTabs();
          renderPatientList();
        });
      });
    }

    function renderPatientList(){
      const keyword = $("search").value.trim();
      const risk = $("riskFilter").value;
      const nodule = $("noduleFilter").value;
      const moduleStatusMap = {
        report:"report",
        review:"review",
        push:"push",
        followup:"followup"
      };
      const effectiveStatus = currentStatus !== "all" ? currentStatus : (moduleStatusMap[currentModule] || "all");
      const list = patients.filter(p => {
        const byStatus = effectiveStatus === "all" || p.stage === effectiveStatus;
        const byRisk = risk === "all" || p.risk === risk;
        const byNodule = nodule === "all" || p.noduleType === nodule;
        const byKeyword = !keyword || [p.name,p.phone,p.nodule].some(x => x.includes(keyword));
        return byStatus && byRisk && byNodule && byKeyword;
      });
      $("patientList").innerHTML = `
        <table class="patient-table">
          <thead>
            <tr>
              <th>患者</th>
              <th>结节入口</th>
              <th>风险</th>
              <th>当前状态</th>
              <th>负责人</th>
              <th>下一处理</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(p => `
              <tr class="${p.id === currentPatientId ? "active" : ""}" data-id="${p.id}">
                <td>
                  <div class="patient-cell-name">${p.name}</div>
                  <div class="patient-cell-sub">${p.age}岁 · ${p.phone}</div>
                </td>
                <td>${p.nodule}</td>
                <td><span class="tag ${p.risk}">${riskText(p.risk)}</span></td>
                <td><span class="tag blue">${stageLabels[p.stage]}</span></td>
                <td>${p.owner}</td>
                <td>${p.next}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      $("patientList").querySelectorAll("tbody tr").forEach(row => {
        row.addEventListener("click", () => {
          currentPatientId = row.dataset.id;
          renderAll();
        });
      });
    }

    function renderPatientStrip(){
      const p = currentPatient();
      $("patientStrip").innerHTML = `
        <div class="person">
          <div class="name">${p.name}</div>
          <div class="sub">${p.age}岁 · ${p.phone} · ${p.nodule}</div>
        </div>
        <div class="strip-grid">
          <div class="mini"><div class="k">当前状态</div><div class="v">${stageLabels[p.stage]}</div></div>
          <div class="mini"><div class="k">风险分层</div><div class="v"><span class="tag ${p.risk}">${riskText(p.risk)}</span></div></div>
          <div class="mini"><div class="k">当前负责人</div><div class="v">${p.owner}</div></div>
          <div class="mini"><div class="k">下一处理时间</div><div class="v">${p.next}</div></div>
        </div>
      `;
    }

    function renderFlow(){
      const p = currentPatient();
      const steps = [
        ["report","处理报告","上传/查看报告，AI结构化"],
        ["parsed","AI生成报告","生成健康管理报告草稿"],
        ["review","医生复核","医生确认后才能推送"],
        ["push","推送患者","小程序/企微/短信触达"],
        ["followup","随访闭环","生成任务，异常转人工"]
      ];
      const order = ["report","parsed","review","push","followup"];
      const currentIndex = order.indexOf(p.stage);
      $("flow").innerHTML = steps.map(([id,title,sub], index) => {
        const done = currentIndex > index || ["alert","done"].includes(p.stage);
        const active = p.stage === id || (p.stage === "alert" && id === "followup");
        return `<div class="step ${done ? "done" : ""} ${active ? "active" : ""}">
          <div class="step-title">${index + 1}. ${title}</div>
          <div class="step-sub">${sub}</div>
        </div>`;
      }).join("");
    }

    function renderWorkPanel(){
      const p = currentPatient();
      $("activeStageTag").textContent = stageLabels[p.stage];
      if(currentModule === "stats"){
        $("activeStageTag").textContent = "管理统计";
        $("workPanel").innerHTML = `
          <div class="report-grid">
            <div class="k">患者总量</div><div class="v">68 人，覆盖乳腺、甲状腺、肺部及多部位合并结节。</div>
            <div class="k">报告处理</div><div class="v">今日待处理 9 份，AI结构化完成后进入医生复核。</div>
            <div class="k">复核推送</div><div class="v">待医生复核 7 份，待推送患者 12 人。</div>
            <div class="k">随访闭环</div><div class="v">本月随访完成率 86%，异常待处理 1 条。</div>
          </div>
          <div class="action-bar"><button class="primary">导出统计</button><button class="btn">查看明细</button></div>
        `;
        return;
      }
      let actions = "";
      if(p.stage === "report"){
        actions = `<button class="primary" id="parseBtn">AI结构化解析</button><button class="btn">补充报告资料</button>`;
      }else if(p.stage === "parsed"){
        actions = `<button class="primary" id="genReportBtn">生成健康管理报告</button><button class="btn">查看结构化字段</button>`;
      }else if(p.stage === "review"){
        actions = `<button class="primary" id="reviewBtn">医生确认复核</button><button class="btn">退回修改</button>`;
      }else if(p.stage === "push"){
        actions = `<button class="primary" id="pushBtn">推送患者</button><button class="btn">预览小程序</button><button class="btn">企微话术</button>`;
      }else if(p.stage === "followup"){
        actions = `<button class="primary" id="followBtn">记录随访结果</button><button class="btn">发送复查提醒</button>`;
      }else if(p.stage === "alert"){
        actions = `<button class="primary" id="alertBtn">转医生处理</button><button class="btn">查看患者反馈</button>`;
      }else{
        actions = `<button class="btn">查看闭环记录</button>`;
      }

      $("workPanel").innerHTML = `
        <div class="report-grid">
          <div class="k">检查/报告摘要</div><div class="v">${p.report}</div>
          <div class="k">AI处理结果</div><div class="v">${p.ai}</div>
          <div class="k">患者触达说明</div><div class="v">患者不登录主系统。系统由工作人员操作，通过小程序、企业微信、短信或电话把报告解释、复查提醒和随访问卷触达患者。</div>
          <div class="k">当前动作</div><div class="v">根据状态推进下一步，推进后患者队列、任务列表和统计数字同步变化。</div>
        </div>
        <div class="action-bar">${actions}</div>
      `;

      const bind = (id, handler) => { const el = $(id); if(el) el.addEventListener("click", handler); };
      bind("parseBtn", () => setStage(p,"parsed","AI结构化解析完成"));
      bind("genReportBtn", () => setStage(p,"review","健康管理报告已生成，进入医生复核"));
      bind("reviewBtn", () => setStage(p,"push","医生已复核，允许推送患者"));

                <label class="filter-item"><span class="req">就诊医生</span><select><option>李医生</option><option>王医生</option></select></label>
                <label class="filter-item"><span class="req">检查日期</span><input type="date" value="2026-04-20"></label>
                <label class="filter-item">导入批次号<input placeholder="系统自动生成或手填"></label>
                <div></div>
              </div>
            </section>

            <section class="form-sec">
              <div class="sec-h"><span class="no">三</span>结节信息</div>
              <div style="margin-bottom:12px">
                <div class="muted" style="font-size:12px;font-weight:800;margin-bottom:8px"><span class="req">结节类型</span></div>
                <div class="tag-row" id="recordNoduleTags">
                  <button type="button" class="tag-btn">乳腺结节</button>
                  <button type="button" class="tag-btn">甲状腺结节</button>
                  <button type="button" class="tag-btn active">肺部结节</button>
                  <button type="button" class="tag-btn">肺+甲</button>
                  <button type="button" class="tag-btn">肺+乳</button>
                  <button type="button" class="tag-btn">甲+乳</button>
                  <button type="button" class="tag-btn">三合并</button>
                </div>
              </div>
              <div class="form-grid cols3">
                <label class="filter-item"><span class="req">初始风险等级</span><select><option class="metric-red">高风险</option><option>中风险</option><option>低风险</option></select></label>
                <label class="filter-item"><span class="req">结节部位</span><select><option>右上肺</option><option>左上肺</option><option>右下肺</option></select></label>
                <label class="filter-item"><span class="req">最大直径</span><div style="display:flex;gap:8px;align-items:center"><input value="8" style="flex:1"><span class="muted">mm</span></div></label>
                <label class="filter-item"><span class="req">影像特征</span><select><option>磨玻璃</option><option>实性</option><option>混合</option></select></label>
                <label class="filter-item"><span class="req">初步建议</span><select><option>建议随访复查</option><option>建议进一步检查</option></select></label>
                <label class="filter-item"><span class="req">是否需要医生复核</span><div style="display:flex;align-items:center;gap:10px;height:34px"><span class="toggle on" id="recordNeedReview" aria-hidden="true"></span><span class="muted" style="font-weight:800">是</span></div></label>
              </div>
            </section>

            <section class="form-sec">
              <div class="sec-h"><span class="no">四</span>报告资料</div>
              <div class="form-grid">
                <label class="filter-item"><span class="req">报告类型</span><select><option>CT报告</option><option>超声报告</option><option>病理报告</option></select></label>
                <label class="filter-item"><span class="req">上传检查报告</span><input type="file" disabled style="opacity:.75"></label>
              </div>
              <div style="display:grid;gap:10px;margin-top:10px">
                <div class="file-card2">
                  <div class="fi pdf">PDF</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:950;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">肺部CT_20260420.pdf</div>
                    <div class="muted" style="font-size:12px;margin-top:2px">2.4 MB · 已校验</div>
                  </div>
                  <span class="tag green">✓</span>
                </div>
                <div class="file-card2">
                  <div class="fi zip">ZIP</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:950;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">影像附件包.zip</div>
                    <div class="muted" style="font-size:12px;margin-top:2px">18.6 MB · 已校验</div>
                  </div>
                  <span class="tag green">✓</span>
                </div>
                <div class="upload-zone">☁ 拖拽文件到此处，或 <b style="color:#155eef">稍后上传</b></div>
              </div>
            </section>

            <section class="form-sec">
              <div class="sec-h"><span class="no">五</span>负责人设置</div>
              <div class="form-grid cols3">
                <label class="filter-item"><span class="req">负责医生</span><select><option>李医生</option><option>王医生</option></select></label>
                <label class="filter-item"><span class="req">健康管理师</span><select><option>杨健管</option><option>赵健管</option></select></label>
                <label class="filter-item"><span class="req">随访护士</span><select><option>韩护士</option><option>刘护士</option></select></label>
                <label class="filter-item full"><span class="req">所属科室</span><select><option>健康管理科</option><option>呼吸内科</option></select></label>
              </div>
            </section>
          </div>

          <aside class="record-side">
            <div class="side-card">
              <div class="dash-title" style="margin-bottom:10px">建档后流程</div>
              <div class="wf-grid">
                <div class="wf-node"><div class="ic">档</div><div style="font-weight:900;color:#0f172a">建档</div><div class="muted" style="font-size:11px;margin-top:4px">完成</div></div>
                <div class="wf-node"><div class="ic">报</div><div style="font-weight:900;color:#0f172a">上传报告</div><div class="muted" style="font-size:11px;margin-top:4px">待处理</div></div>
                <div class="wf-node"><div class="ic">AI</div><div style="font-weight:900;color:#0f172a">AI解析</div><div class="muted" style="font-size:11px;margin-top:4px">排队</div></div>
                <div class="wf-node"><div class="ic">稿</div><div style="font-weight:900;color:#0f172a">生成健康报告</div><div class="muted" style="font-size:11px;margin-top:4px">草稿</div></div>
              </div>
              <div class="wf-arrow">↓</div>
              <div class="wf-grid">
                <div class="wf-node"><div class="ic">医</div><div style="font-weight:900;color:#0f172a">医生复核</div><div class="muted" style="font-size:11px;margin-top:4px">待办</div></div>
                <div class="wf-node"><div class="ic">推</div><div style="font-weight:900;color:#0f172a">推送患者</div><div class="muted" style="font-size:11px;margin-top:4px">待办</div></div>
                <div class="wf-node"><div class="ic">随</div><div style="font-weight:900;color:#0f172a">随访任务</div><div class="muted" style="font-size:11px;margin-top:4px">生成</div></div>
                <div class="wf-node"><div class="ic">环</div><div style="font-weight:900;color:#0f172a">闭环</div><div class="muted" style="font-size:11px;margin-top:4px">目标</div></div>
              </div>
              <div class="muted" style="margin-top:10px;line-height:1.65">闭环管理，确保每位患者获得及时、规范的随访服务。</div>
            </div>

            <div class="side-card">
              <div class="dash-title" style="margin-bottom:10px">档案预览</div>
              <div class="kvs">
                <div><div class="k">患者姓名</div><div class="v">张*国</div></div>
                <div><div class="k">来源</div><div class="v">门诊 · 呼吸内科</div></div>
                <div><div class="k">结节类型</div><div class="v"><span class="tag blue">肺部结节</span></div></div>
                <div><div class="k">风险等级</div><div class="v"><span class="tag high">高风险</span></div></div>
                <div><div class="k">负责人</div><div class="v">李医生 / 杨健管 / 韩护士</div></div>
                <div><div class="k">下一步</div><div class="v">上传报告 → AI解析</div></div>
              </div>
            </div>

            <div class="follow-tip" style="margin:0">
              <div>患者信息由医院工作人员录入与管理，请确保信息真实准确。</div>
              <button type="button" class="x" title="关闭">×</button>
            </div>
          </aside>
        </div>

        <div class="record-foot">
          <button class="primary" type="button" id="recordSave">保存档案</button>
          <button class="btn" type="button">保存并上传报告</button>
          <button class="btn" type="button">保存并发送问卷</button>
          <button class="btn" type="button">保存并进入报告处理</button>
          <button class="btn" type="button" style="margin-right:auto">取消</button>
        </div>
      `;

      const root = $("content");
      root.querySelectorAll("#recordMethods .method-card").forEach(card => {
        card.addEventListener("click", () => {
          root.querySelectorAll("#recordMethods .method-card").forEach(c => c.classList.remove("active"));
          card.classList.add("active");
        });
      });
      root.querySelectorAll("#recordNoduleTags .tag-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          root.querySelectorAll("#recordNoduleTags .tag-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        });
      });
      const rv = root.querySelector("#recordNeedReview");
      if(rv){
        rv.addEventListener("click", () => {
          rv.classList.toggle("on");
        });
      }
      const save = root.querySelector("#recordSave");
      if(save) save.addEventListener("click", () => toast("已保存档案（示意）"));
    }

    function bindWorkflowEvents(){
      $("search").addEventListener("input", renderPatientList);
      $("riskFilter").addEventListener("change", renderPatientList);
      $("noduleFilter").addEventListener("change", () => {
        currentNodule = $("noduleFilter").value;
        renderNoduleEntries();
        renderEntrySummary();
        renderPatientList();
      });
      $("newPatient").addEventListener("click", () => toast("新建患者档案：工作人员录入/导入患者，不是患者登录"));
    }

    function bindGlobal(){
      $("loginSubmit").addEventListener("click", () => {
        const org = $("loginOrg").value;
        $("loginPage").classList.add("hide");
        $("orgName").textContent = org;
        toast(`已登录：${org}`);
      });
      $("loginReset").addEventListener("click", () => {
        $("loginOrg").value = "平邑县中医院";
        $("loginAccount").value = "admin";
        $("loginPassword").value = "123456";
      });
    }

    function renderAll(){
      renderNav();
      $("summary").style.display = "";
      renderSummary();
      if(currentModule === "workbench"){
        $("contextbar").style.display = "none";
        renderDashboard();
        return;
      }
      if(currentModule === "queue"){
        $("contextbar").style.display = "none";
        renderQueuePage();
        return;
      }
      if(currentModule === "record"){
        $("contextbar").style.display = "none";
        $("summary").style.display = "none";
        renderRecordPage();
        return;
      }
      if(currentModule === "report"){
        $("contextbar").style.display = "none";
        renderReportPage();
        return;
      }
      if(currentModule === "review"){
        $("contextbar").style.display = "none";
        renderReviewPage();
        return;
      }
      if(currentModule === "followup"){
        $("contextbar").style.display = "none";
        renderFollowupPage();
        return;
      }
      if(currentModule === "stats"){
        $("contextbar").style.display = "none";
        renderStatsPage();
        return;
      }
      $("contextbar").style.display = "flex";
      ensureWorkflowLayout();
      renderNoduleFilterOptions();
      renderNoduleEntries();
      renderContextbar();
      renderEntrySummary();
      renderStatusTabs();
      renderPatientList();
      renderPatientStrip();
      renderFlow();
      renderWorkPanel();
      renderBoundary();
      renderTasks();
    }

    renderAll();
    bindGlobal();
  </script>
</body>
</html>
